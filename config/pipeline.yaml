project:
  name: urban_mobility_data_lakehouse
  environment: dev

paths:
  raw_data: data/raw
  bronze_data: data/lake/bronze
  silver_data: data/lake/silver
  gold_data: data/lake/gold
  logs: logs
  warehouse: warehouse

dataset:
  taxi_type: yellow
  year: 2024
  months: [1, 2, 3]

validation:
  required_columns:
    - VendorID
    - tpep_pickup_datetime
    - tpep_dropoff_datetime
    - passenger_count
    - trip_distance
    - PULocationID
    - DOLocationID
    - payment_type
    - fare_amount
    - total_amount

runtime:
  write_format: parquet
  fail_on_missing_columns: true
  create_missing_directories: true